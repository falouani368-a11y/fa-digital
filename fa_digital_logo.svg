<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&amp;display=swap');
    </style>
  </defs>

  <!-- Fond -->
  <rect width="680" height="320" rx="16" fill="#0e0f11"/>

  <!-- Bracket gauche -->
  <polyline points="198,80 180,80 180,240 198,240" fill="none" stroke="#00e676" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bracket droite -->
  <polyline points="482,80 500,80 500,240 482,240" fill="none" stroke="#00e676" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Texte FA -->
  <text x="207" y="210" font-family="'Syne', sans-serif" font-weight="800" font-size="72" letter-spacing="-2">
    <tspan fill="#00e676">F</tspan><tspan fill="#ffffff">A</tspan>
  </text>

  <!-- Ligne séparatrice -->
  <line x1="340" y1="100" x2="340" y2="220" stroke="#00e676" stroke-width="1.5" opacity="0.4"/>

  <!-- Point sur la ligne -->
  <circle cx="340" cy="160" r="4" fill="#00e676"/>

  <!-- Tag DIGITAL -->
  <text x="365" y="152" font-family="'Syne', sans-serif" font-weight="700" font-size="13" fill="#00e676" letter-spacing="4">DIGITAL</text>

  <!-- Points déco -->
  <circle cx="180" cy="160" r="3" fill="#00e676" opacity="0.6"/>
  <circle cx="500" cy="160" r="3" fill="#00e676" opacity="0.6"/>

  <!-- Ligne basse -->
  <line x1="207" y1="228" x2="473" y2="228" stroke="#00e676" stroke-width="1.5" opacity="0.3"/>

  <!-- Sous-texte -->
  <text x="340" y="266" font-family="'Syne', sans-serif" font-size="11" fill="#555555" text-anchor="middle" letter-spacing="6">WEB &amp; PERFORMANCE</text>
</svg>
